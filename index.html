<script>
/* ── 저장소 어댑터: Firebase → 기기 저장 → 임시 저장 순서로 자동 선택 ── */
(function () {
  var mode = "memory";
  var mem = {};
  var db = null;
  try {
    if (typeof firebase !== "undefined" && FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.databaseURL) {
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.database();
      mode = "firebase";
    } else if (typeof firebase === "undefined" && FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey) {
      console.warn("Firebase 스크립트가 로드되지 않았습니다(네트워크 차단 가능). 기기 저장으로 전환합니다.");
    }
  } catch (e) { console.warn("Firebase 초기화 실패 — 기기 저장으로 전환:", e); db = null; }
  if (!db) {
    try { localStorage.setItem("__probe", "1"); localStorage.removeItem("__probe"); mode = "local"; }
    catch (e) { mode = "memory"; }
  }
  var P = function (k) { return "rooms/" + ROOM_ID + "/" + k; };
  window.STORAGE_MODE = mode;

  /* 연결 확인: 5초 안에 응답이 없으면 기기 저장으로 자동 전환
     (미리보기 등 외부 통신이 막힌 환경에서 무한 대기 방지) */
  function withTimeout(p, ms) {
    return Promise.race([p, new Promise(function (_, rej) {
      setTimeout(function () { rej(new Error("연결 시간 초과")); }, ms);
    })]);
  }
  function fallbackLocal() {
    db = null;
    try { localStorage.setItem("__probe", "1"); localStorage.removeItem("__probe"); mode = "local"; }
    catch (e) { mode = "memory"; }
    window.STORAGE_MODE = mode;
  }
  var ready = (function () {
    if (!db) return Promise.resolve();
    return withTimeout(db.ref(P("__ping")).once("value"), 5000)
      .then(function () { window.STORAGE_MODE = "firebase"; })
      .catch(function (e) {
        console.warn("Firebase에 연결할 수 없어 기기 저장으로 전환합니다:", e && e.message);
        fallbackLocal();
      });
  })();

  window.storage = {
    get: async function (key) {
      await ready;
      if (db) {
        var snap = await withTimeout(db.ref(P(key)).once("value"), 8000);
        if (snap.val() == null) throw new Error("not found");
        return { value: snap.val() };
      }
      var v = mode === "local" ? localStorage.getItem(P(key)) : (P(key) in mem ? mem[P(key)] : null);
      if (v == null) throw new Error("not found");
      return { value: v };
    },
    set: async function (key, value) {
      await ready;
      if (db) { await withTimeout(db.ref(P(key)).set(value), 8000); }
      else if (mode === "local") { localStorage.setItem(P(key), value); }
      else { mem[P(key)] = value; }
      return { key: key };
    },
    delete: async function (key) {
      await ready;
      if (db) { await withTimeout(db.ref(P(key)).remove(), 8000); }
      else if (mode === "local") { localStorage.removeItem(P(key)); }
      else { delete mem[P(key)]; }
      return { key: key };
    }
  };
})();
</script>
